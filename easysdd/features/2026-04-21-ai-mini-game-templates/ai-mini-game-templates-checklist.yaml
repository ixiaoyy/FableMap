feature: 2026-04-21-ai-mini-game-templates
created: 2026-04-21

steps:
  - action: "先写失败的小游戏纯函数脚本测试：覆盖模板数量、id 唯一、排序、兜底、prompt 安全约束"
    exit_signal: "node frontend/scripts/mini-games-test.mjs 在实现前失败，失败原因指向缺少 tavernMiniGames.js 模块或相关导出"
    status: done
  - action: "新建小游戏模板纯函数模块：定义 6 个模板、排序函数、开局提示生成函数"
    exit_signal: "node frontend/scripts/mini-games-test.mjs 输出 mini-games-test: ok，且模板 id 唯一、开局提示包含模板标题和安全边界"
    status: done
  - action: "新建小游戏面板组件与样式：组件只接收 props，不发请求、不读写 localStorage"
    exit_signal: "组件能在无模板时返回 null，在有模板时渲染按钮并调用 onStart(template)"
    status: done
  - action: "薄接入 TavernChatRoom：计算模板、处理点击、放到输入区上方"
    exit_signal: "点击模板后走现有单聊/群聊发送链路；ChatInputArea 快捷句仍保留"
    status: done
  - action: "接入前端测试脚本与文档记录：更新 package test 并补充用户可见变化说明"
    exit_signal: "npm --prefix .\\frontend test 包含 mini-games 测试；文档说明不涉及 schema/API 变更"
    status: done
  - action: "构建与移动端样式收口：检查窄屏布局并运行前端 build"
    exit_signal: "npm --prefix .\\frontend run build 成功；既有 chunk size warning 只记录不解决"
    status: done

